# Supabase-Konfiguration (Quelle der Wahrheit für Function-Flags)

[functions.anfrage-webhook]
# Öffentlicher Webhook — das Website-Widget sendet ohne Auth-Header.
# Schutz erfolgt über den ?key=-Shared-Secret in der Function selbst.
verify_jwt = false

[functions.sende-mail]
# Nur der eingeloggte Admin darf Mails auslösen.
# Benötigt Secret SMTP_PASS (optional SMTP_HOST/PORT/USER/FROM/FROM_NAME).
verify_jwt = true

[functions.angebot-annehmen]
# Öffentlicher Link aus der Angebots-Mail (Gast klickt "Annehmen").
# Schutz über den unratbaren annahme_token pro Buchung. Erzeugt serverseitig
# die Anzahlungsrechnung und mailt sie dem Gast (nutzt dieselben SMTP-Secrets).
verify_jwt = false
